---
  name: Build and publish release
  run-name: ${{ github.actor }} is preparing the next release
  
  permissions:
    pull-requests: write
    contents: write
    packages: write
  
  on:
    workflow_dispatch:
      inputs:
        rc:
          description: "Release candidate number for this release."
          required: true
          type: number
    push:
      tags:
        - "v*.*.*"
  
  jobs:
    release-type-determination:
      name: Determine if tag is pre-release or not
      runs-on: ubuntu-latest
      outputs:
        is_prerelease: ${{ steps.check-prerelease.outputs.is_prerelease }}
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
  
        - name: Set up Python 3
          uses: actions/setup-python@v4
          with:
            python-version: "3.x"
  
        - name: Install dependencies
          run: pip install git-python packaging tomli requests
  
        - name: Getting release job
          run: curl -Ls -o rc.py https://raw.githubusercontent.com/freva-org/freva-admin/main/release.py
  
        - name: Check if tag is a pre-release
          id: check-prerelease
          run: |
            RC="${{ github.event_name == 'workflow_dispatch' && inputs.rc || '' }}"
            IS_PRERELEASE="false"
            if [ "$RC" ]; then
              python3 rc.py rc $RC climateclaw -p . 1> tag.txt
              IS_PRERELEASE="true"
            else
              python3 -c "exec(open('src/climateclaw/_version.py').read()); print(__version__)" 1> tag.txt
            fi
            echo "$IS_PRERELEASE" > is_prerelease.txt
            echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
  
  
        - name: Upload Outputs
          uses: actions/upload-artifact@v4
          with:
            name: release-metadata
            path: |
              tag.txt
              is_prerelease.txt
  
    tests:
      name: Test (Python ${{ matrix.python-version }})
      runs-on: ubuntu-latest
      strategy:
        matrix:
          python-version: ["3.10", "3.11", "3.12"]
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v4
          with:
            python-version: ${{ matrix.python-version }}
        - run: pip install tox
        - run: tox -e test
  
    pypi:
      name: Publish to PyPI
      needs: [tests, release-type-determination]
      if: needs.release-type-determination.outputs.is_prerelease == 'false'
      runs-on: ubuntu-latest
      permissions:
        id-token: write
        contents: read
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v4
          with:
            python-version: "3.x"
        - run: python -m pip install build
        - run: python -m build
        - name: Publish to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            skip-existing: true
            verbose: true
  
    pypi-prerelease:
      name: Publish pre-release to PyPI
      needs: [tests, release-type-determination]
      if: needs.release-type-determination.outputs.is_prerelease == 'true'
      runs-on: ubuntu-latest
      permissions:
        id-token: write
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Download Release Metadata
          uses: actions/download-artifact@v4
          with:
            name: release-metadata
  
        - name: Read tag version
          run: |
            TAG=$(tail -1 tag.txt)
            echo "TAG=$TAG" >> $GITHUB_ENV
  
        - name: Setup Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.x"
  
        - name: Install build tools
          run: python -m pip install build tomli
  
        - name: Update version for pre-release
          run: |
            sed -i "s/__version__ = .*/__version__ = \"${{ env.TAG }}\"/" src/climateclaw/_version.py
  
        - name: Build package
          run: python -m build
  
        - name: Publish to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            password: ${{ secrets.TEST_PYPI_TOKEN }}
            skip-existing: true
            verbose: true
  
    clawhub:
      name: Publish to ClawHub
      needs: [tests, release-type-determination]
      if: needs.release-type-determination.outputs.is_prerelease == 'false'
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Download Release Metadata
          uses: actions/download-artifact@v4
          with:
            name: release-metadata
            path: release-metadata
  
        - name: Read version
          run: |
            TAG="$(tail -n 1 release-metadata/tag.txt)"
            echo "TAG=$TAG" >> "$GITHUB_ENV"
  
        - name: Install clawhub CLI
          run: npm i -g clawhub
  
        - name: Publish skill to ClawHub
          run: |
            clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}
            clawhub publish . \
              --slug climateclaw \
              --version ${{ env.TAG }} \
              --changelog "Release v${{ env.TAG }}"
  
    github-release:
      name: Create GitHub Release
      needs: [tests, release-type-determination]
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Download Release Metadata
          uses: actions/download-artifact@v4
          with:
            name: release-metadata
            path: release-metadata
  
        - name: Read Metadata
          shell: bash
          run: |
            TAG="$(tail -n 1 release-metadata/tag.txt)"
            IS_PRERELEASE="$(tail -n 1 release-metadata/is_prerelease.txt)"
            echo "TAG=$TAG" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"
  
        - name: Create GitHub Release
          uses: softprops/action-gh-release@v1
          with:
            tag_name: v${{ env.TAG }}
            name: Release v${{ env.TAG }}
            prerelease: ${{ env.IS_PRERELEASE == 'true' }}
            generate_release_notes: true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
